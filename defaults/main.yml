# code: language=ansible
# vim: set filetype=yaml.ansible :
---
pingtunnel_install_url: https://github.com/esrrhs/pingtunnel/releases/download/master-ec0bd723f675ccbb3ab0f680b3fe5f09d5c69795/pingtunnel_linux_amd64.zip
pingtunnel_install_tmp_path: "/tmp/pingtunnel.zip"
pingtunnel_server_service_name: pingtunnel-server
# pingtunnel_server_options:
#   - -key 982
#   - -nolog 1
pingtunnel_server_options: []
pingtunnel_server_install: true
# pingtunnel_clients:
#   pingtunnel-client:
#     options:
#       - -key 982
#       - -l :11000
#       - -s 1.1.1.1
#       - -t 1.1.1.1:11000
#       - -nolog 1
pingtunnel_clients: {}
pingtunnel_user: pingtunnel
pingtunnel_default_unit_options:
  Wants: network-online.target
  After: network-online.target
pingtunnel_default_service_options:
  User: "{{ pingtunnel_user }}"
  Restart: always
  TimeoutStopSec: 5s
  LimitNOFILE: 1048576
  ProtectSystem: strict
  ProtectHome: tmpfs
  PrivateTmp: true
  PrivateDevices: true
  ProtectKernelTunables: true
  ProtectKernelModules: true
  ProtectKernelLogs: true
  ProtectControlGroups: true
  MemoryDenyWriteExecute: true
  LockPersonality: true
  RestrictRealtime: true
  ProtectClock: true
  RestartSec: 10
  StartLimitBurst: 30
  StartLimitIntervalSec: 30
  AmbientCapabilities: CAP_NET_RAW
  CapabilityBoundingSet: CAP_NET_RAW
